# GitLab CI for vauchi-website
#
# Landing page + app-files content hosting
#
# GitLab Ultimate Features:
#   - Secret Detection: Prevent credential leaks
#   - Container Scanning: Docker image vulnerability scanning

# GitLab Ultimate Templates
include:
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml
  - project: 'vauchi/scripts'
    ref: main
    file: '/ci-templates/reuse.yml'

variables:
  CS_IMAGE: "${CI_REGISTRY_IMAGE:-vauchi-website}:$CI_COMMIT_SHA"

stages:
  - lint
  - test
  - build
  - scan
  - deploy

# Lint HTML files
lint:html:
  stage: lint
  tags:
    - self-hosted
    - node
  needs: []
  script:
    - htmlhint public/**/*.html
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "public/**/*.html"
    - if: $CI_COMMIT_BRANCH == "main"

# Lint nginx config
lint:nginx:
  stage: lint
  image: nginx:alpine
  script:
    - nginx -t -c /dev/stdin < nginx.conf || true
    - echo "Nginx config syntax check complete"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  allow_failure: true

# Validate app-files content against schemas
lint:content:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install --quiet jsonschema
  script:
    - python scripts/validate-content.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - changes:
        - app-files-src/**/*
        - scripts/**/*

# Build app-files manifest and output
build:content:
  stage: build
  image: python:3.11-slim
  script:
    - python scripts/build-manifest.py --version "${CONTENT_VERSION:-1.0.0}"
  artifacts:
    paths:
      - public/app-files/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - changes:
        - app-files-src/**/*
        - scripts/**/*

# Build and push docker image
#
# On MRs: builds the image to validate the Dockerfile (local tag only).
# On main: builds and pushes to GitLab Container Registry.
#
# Note: CI_REGISTRY_IMAGE may be empty if the project container registry
# is not enabled, so we fall back to a local tag for validation builds.
build:docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_BUILDKIT: "1"
  script:
    - IMAGE="${CI_REGISTRY_IMAGE:-vauchi-website}"
    - docker build -t $IMAGE:$CI_COMMIT_SHA .
    - docker tag $IMAGE:$CI_COMMIT_SHA $IMAGE:latest
    - |
      if [ -n "$CI_REGISTRY_PASSWORD" ] && [ -n "$CI_REGISTRY_IMAGE" ]; then
        echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
        docker push $IMAGE:$CI_COMMIT_SHA
        docker push $IMAGE:latest
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# Container vulnerability scanning (overrides GitLab template)
container_scanning:
  stage: scan
  needs: ["build:docker"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ============================================================
# Deploy Stage (manual gate)
# ============================================================
#
# Deploy website to production VPS via SSH + Docker.
# Replaces the Kamal accessory container with the CI-built image.
# Brief downtime (~2s) is acceptable for a static landing page.
#
# Required CI/CD variables (group or project level):
#   DEPLOY_SSH_PRIVATE_KEY  — Ed25519 private key for ssh vauchi@<host>
#   DEPLOY_HOST             — VPS hostname (e.g. bold-hopper-vps)
#   KAMAL_REGISTRY_PASSWORD — GitLab container registry token

deploy:production:
  stage: deploy
  image: alpine:latest
  needs:
    - job: build:docker
  variables:
    GIT_STRATEGY: none
    WEBSITE_CONTAINER: "vauchi-relay-landing"
  before_script:
    - apk add --no-cache openssh-client curl
    - mkdir -p ~/.ssh
    - echo "$DEPLOY_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - |
      IMAGE="$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
      SSH_TARGET="${DEPLOY_USER:-vauchi}@${DEPLOY_HOST}"
      echo "Deploying website: $IMAGE"

      # Pull new image on server
      ssh "$SSH_TARGET" \
        "echo '${KAMAL_REGISTRY_PASSWORD}' | docker login -u gitlab-ci-token --password-stdin ${CI_REGISTRY} && docker pull ${IMAGE}"

      # Replace website container (stop old → start new on same port)
      ssh "$SSH_TARGET" "\
        docker stop ${WEBSITE_CONTAINER} 2>/dev/null || true && \
        docker rm ${WEBSITE_CONTAINER} 2>/dev/null || true && \
        docker run -d --name ${WEBSITE_CONTAINER} -p 3080:80 ${IMAGE}"

      # Verify externally
      sleep 3
      STATUS=$(curl -sf -o /dev/null -w '%{http_code}' --max-time 10 "https://vauchi.app/" || echo "000")
      if [ "$STATUS" = "200" ]; then
        echo "Deployment verified — website healthy"
      else
        echo "WARNING: Health check returned $STATUS"
        exit 1
      fi
  environment:
    name: production
    url: https://vauchi.app
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
