# GitLab CI for vauchi-website
#
# Landing page + app-files content hosting
#
# GitLab Ultimate Features:
#   - Secret Detection: Prevent credential leaks
#   - Container Scanning: Docker image vulnerability scanning

# GitLab Ultimate Templates
include:
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml
  - project: 'vauchi/scripts'
    ref: main
    file: '/ci-templates/reuse.yml'

stages:
  - lint
  - test
  - build

# Lint HTML files
lint:html:
  stage: lint
  tags:
    - self-hosted
    - node
  needs: []
  script:
    - htmlhint public/**/*.html
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "public/**/*.html"
    - if: $CI_COMMIT_BRANCH == "main"

# Lint nginx config
lint:nginx:
  stage: lint
  image: nginx:alpine
  script:
    - nginx -t -c /dev/stdin < nginx.conf || true
    - echo "Nginx config syntax check complete"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  allow_failure: true

# Validate app-files content against schemas
lint:content:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install --quiet jsonschema
  script:
    - python scripts/validate-content.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - changes:
        - app-files-src/**/*
        - scripts/**/*

# Build app-files manifest and output
build:content:
  stage: build
  image: python:3.11-slim
  script:
    - python scripts/build-manifest.py --version "${CONTENT_VERSION:-1.0.0}"
  artifacts:
    paths:
      - public/app-files/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - changes:
        - app-files-src/**/*
        - scripts/**/*

# Build docker image (MR validation — build only, no push)
build:docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t vauchi-website:test .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Build and push to GitLab Container Registry (main only)
build:push:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_BUILDKIT: "1"
    IMAGE_NAME: $CI_REGISTRY/vauchi/website/vauchi-landing
  script:
    - docker build -t $IMAGE_NAME:$CI_COMMIT_SHA .
    - docker tag $IMAGE_NAME:$CI_COMMIT_SHA $IMAGE_NAME:latest
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
    - docker push $IMAGE_NAME:$CI_COMMIT_SHA
    - docker push $IMAGE_NAME:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
