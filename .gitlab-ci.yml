# GitLab CI for vauchi-website
#
# Landing page + app-files content hosting
#
# GitLab Ultimate Features:
#   - Secret Detection: Prevent credential leaks
#   - Container Scanning: Docker image vulnerability scanning
#   - SAST: Static code analysis (JS security)
#   - Dependency Scanning: npm vulnerability detection

# GitLab Ultimate Templates
include:
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/reuse.yml'
      - '/ci-templates/badges.yml'

variables:
  CS_IMAGE: "registry.gitlab.com/vauchi/website:$CI_COMMIT_SHA"

stages:
  - lint
  - test
  - build
  - scan
  - deploy

# Lint HTML files
lint:html:
  stage: lint
  tags:
    - self-hosted
    - node
  needs: []
  script:
    - htmlhint public/**/*.html
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "public/**/*.html"
    - if: $CI_COMMIT_BRANCH == "main"

# Lint nginx config
lint:nginx:
  stage: lint
  tags: [docker]
  image: nginx:alpine
  script:
    - nginx -t -c /dev/stdin < nginx.conf || true
    - echo "Nginx config syntax check complete"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  allow_failure: true

# Validate app-files content against schemas
lint:content:
  stage: lint
  tags: [docker]
  image: python:3.11-slim
  before_script:
    - pip install --quiet jsonschema
  script:
    - python scripts/validate-content.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - changes:
        - app-files-src/**/*
        - scripts/**/*

# E2E tests — theme toggle & language switching
test:e2e:
  stage: test
  tags: [docker]
  image: mcr.microsoft.com/playwright:v1.58.2-noble
  needs: []
  before_script:
    - npm ci
    - mkdir -p public/app-files/themes
    - curl -fsSL "https://gitlab.com/api/v4/projects/vauchi%2Fthemes/repository/files/themes.json/raw?ref=main"
      -o public/app-files/themes/themes.json
  script:
    - npx playwright test
  artifacts:
    when: always
    paths:
      - test-results/
    reports:
      junit: test-results/results.xml
    expire_in: 3 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "public/**/*"
        - "tests/**/*"
        - "playwright.config.js"
    - if: $CI_COMMIT_BRANCH == "main"

# Build app-files manifest and output
build:content:
  stage: build
  tags: [docker]
  image: python:3.11-slim
  script:
    - python scripts/build-manifest.py --version "${CONTENT_VERSION:-1.0.0}"
      --base-url "https://cdn.vauchi.app/v1/"
  artifacts:
    paths:
      - public/app-files/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - changes:
        - app-files-src/**/*
        - scripts/**/*

# Sign content manifest with Ed25519 (main only)
sign:content:
  stage: build
  tags: [docker]
  image: python:3.11-slim
  needs: ["build:content"]
  before_script:
    - pip install --quiet PyNaCl
  script:
    - |
      if [ -z "${CONTENT_SIGNING_KEY:-}" ]; then
        echo "CONTENT_SIGNING_KEY not set — skipping signing"
        exit 0
      fi
    - echo "$CONTENT_SIGNING_KEY" > /tmp/signing.key
    - python scripts/sign-manifest.py --manifest public/app-files/manifest.json
      --private-key /tmp/signing.key
    - rm -f /tmp/signing.key
  artifacts:
    paths:
      - public/app-files/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Build and push docker image
#
# On MRs: builds the image to validate the Dockerfile (local tag only).
# On main: builds and pushes to GitLab Container Registry.
#
# Note: CI_REGISTRY_IMAGE may be empty if the project container registry
# is not enabled, so we fall back to a local tag for validation builds.
build:docker:
  stage: build
  tags: [docker]
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_BUILDKIT: "1"
  script:
    - IMAGE="${CI_REGISTRY_IMAGE:-vauchi-website}"
    - >-
      printf '{"sha":"%s","short_sha":"%s","ref":"%s","built":"%s","pipeline":"%s"}\n'
      "$CI_COMMIT_SHA" "$CI_COMMIT_SHORT_SHA" "$CI_COMMIT_REF_NAME"
      "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$CI_PIPELINE_URL"
      > public/build-info.json
    - cat public/build-info.json
    # Embed themes.json as local fallback (CDN is primary source at runtime)
    - mkdir -p public/app-files/themes
    - >-
      curl -fsSL
      "https://gitlab.com/api/v4/projects/vauchi%2Fthemes/repository/files/themes.json/raw?ref=main"
      -o public/app-files/themes/themes.json
      || echo "WARN: themes.json fetch failed — CDN will be sole source"
    - docker build -t $IMAGE:$CI_COMMIT_SHA .
    - docker tag $IMAGE:$CI_COMMIT_SHA $IMAGE:latest
    - |
      if [ -n "$CI_REGISTRY_PASSWORD" ] && [ -n "$CI_REGISTRY_IMAGE" ]; then
        echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
        docker push $IMAGE:$CI_COMMIT_SHA
        docker push $IMAGE:latest
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# Container vulnerability scanning (overrides GitLab template)
container_scanning:
  stage: scan
  tags: [docker]
  needs: ["build:docker"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Smoke test against deployed site
test:e2e:deployed:
  stage: deploy
  tags: [docker]
  image: mcr.microsoft.com/playwright:v1.58.2-noble
  needs: []
  when: manual
  before_script:
    - npm ci
  script:
    - BASE_URL=https://vauchi.app npx playwright test
  artifacts:
    when: always
    paths:
      - test-results/
    reports:
      junit: test-results/results.xml
    expire_in: 3 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: true

# Deploy website to production via _private pipeline
# Auto-triggers the centralized deploy pipeline in _private.
# The _private pipeline has manual gate jobs — click "play" there.

deploy:trigger:
  stage: deploy
  needs:
    - job: build:docker
  trigger:
    project: vauchi/private
    branch: main
  variables:
    DEPLOY_SERVICE: landing
    DEPLOY_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Build and push CDN Docker image (content baked in)
build:cdn-docker:
  stage: build
  tags: [docker]
  image: docker:latest
  services:
    - docker:dind
  needs:
    - job: sign:content
      optional: true
    - job: build:content
  variables:
    DOCKER_BUILDKIT: "1"
  script:
    - CDN_IMAGE="${CI_REGISTRY_IMAGE}/cdn"
    - docker build -f cdn/Dockerfile -t $CDN_IMAGE:$CI_COMMIT_SHA .
    - docker tag $CDN_IMAGE:$CI_COMMIT_SHA $CDN_IMAGE:latest
    - |
      if [ -n "$CI_REGISTRY_PASSWORD" ] && [ -n "$CI_REGISTRY_IMAGE" ]; then
        echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
        docker push $CDN_IMAGE:$CI_COMMIT_SHA
        docker push $CDN_IMAGE:latest
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Deploy CDN to production via _private pipeline (same as landing)
deploy:cdn:
  stage: deploy
  needs:
    - job: build:cdn-docker
  trigger:
    project: vauchi/private
    branch: main
  variables:
    DEPLOY_SERVICE: cdn
    DEPLOY_IMAGE: "$CI_REGISTRY_IMAGE/cdn:$CI_COMMIT_SHA"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ============================================================
# Deploy Stage — Badge Pages
# ============================================================

pages:
  extends: .badges-pages
