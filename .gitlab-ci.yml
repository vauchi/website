# GitLab CI for vauchi-website
#
# Landing page + app-files content hosting
#
# GitLab Ultimate Features:
#   - Secret Detection: Prevent credential leaks
#   - Container Scanning: Docker image vulnerability scanning

# GitLab Ultimate Templates
include:
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml
  - project: 'vauchi/scripts'
    ref: main
    file: '/ci-templates/reuse.yml'

variables:
  CS_IMAGE: "registry.gitlab.com/vauchi/website:$CI_COMMIT_SHA"

stages:
  - lint
  - test
  - build
  - scan
  - deploy

# Lint HTML files
lint:html:
  stage: lint
  tags:
    - self-hosted
    - node
  needs: []
  script:
    - htmlhint public/**/*.html
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "public/**/*.html"
    - if: $CI_COMMIT_BRANCH == "main"

# Lint nginx config
lint:nginx:
  stage: lint
  tags: [docker]
  image: nginx:alpine
  script:
    - nginx -t -c /dev/stdin < nginx.conf || true
    - echo "Nginx config syntax check complete"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  allow_failure: true

# Validate app-files content against schemas
lint:content:
  stage: lint
  tags: [docker]
  image: python:3.11-slim
  before_script:
    - pip install --quiet jsonschema
  script:
    - python scripts/validate-content.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - changes:
        - app-files-src/**/*
        - scripts/**/*

# Build app-files manifest and output
build:content:
  stage: build
  tags: [docker]
  image: python:3.11-slim
  script:
    - python scripts/build-manifest.py --version "${CONTENT_VERSION:-1.0.0}"
  artifacts:
    paths:
      - public/app-files/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - changes:
        - app-files-src/**/*
        - scripts/**/*

# Build and push docker image
#
# On MRs: builds the image to validate the Dockerfile (local tag only).
# On main: builds and pushes to GitLab Container Registry.
#
# Note: CI_REGISTRY_IMAGE may be empty if the project container registry
# is not enabled, so we fall back to a local tag for validation builds.
build:docker:
  stage: build
  tags: [docker]
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_BUILDKIT: "1"
  script:
    - IMAGE="${CI_REGISTRY_IMAGE:-vauchi-website}"
    - >-
      printf '{"sha":"%s","short_sha":"%s","ref":"%s","built":"%s","pipeline":"%s"}\n'
      "$CI_COMMIT_SHA" "$CI_COMMIT_SHORT_SHA" "$CI_COMMIT_REF_NAME"
      "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$CI_PIPELINE_URL"
      > public/build-info.json
    - cat public/build-info.json
    - docker build -t $IMAGE:$CI_COMMIT_SHA .
    - docker tag $IMAGE:$CI_COMMIT_SHA $IMAGE:latest
    - |
      if [ -n "$CI_REGISTRY_PASSWORD" ] && [ -n "$CI_REGISTRY_IMAGE" ]; then
        echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
        docker push $IMAGE:$CI_COMMIT_SHA
        docker push $IMAGE:latest
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# Container vulnerability scanning (overrides GitLab template)
container_scanning:
  stage: scan
  tags: [docker]
  needs: ["build:docker"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Deploy website to production via _private pipeline
# Auto-triggers the centralized deploy pipeline in _private.
# The _private pipeline has manual gate jobs — click "play" there.

deploy:trigger:
  stage: deploy
  needs:
    - job: build:docker
  trigger:
    project: vauchi/_private
    branch: main
  variables:
    DEPLOY_SERVICE: landing
    DEPLOY_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
