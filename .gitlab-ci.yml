# GitLab CI for vauchi-website
#
# Landing page + app-files content hosting
#
# GitLab Ultimate Features:
#   - Secret Detection: Prevent credential leaks
#   - Container Scanning: Docker image vulnerability scanning

# GitLab Ultimate Templates
include:
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml
  - project: 'vauchi/scripts'
    ref: main
    file: '/ci-templates/reuse.yml'

variables:
  CS_IMAGE: "registry.gitlab.com/vauchi/website:$CI_COMMIT_SHA"

stages:
  - lint
  - test
  - build
  - scan
  - deploy

# Lint HTML files
lint:html:
  stage: lint
  tags:
    - self-hosted
    - node
  needs: []
  script:
    - htmlhint public/**/*.html
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "public/**/*.html"
    - if: $CI_COMMIT_BRANCH == "main"

# Lint nginx config
lint:nginx:
  stage: lint
  tags: [docker]
  image: nginx:alpine
  script:
    - nginx -t -c /dev/stdin < nginx.conf || true
    - echo "Nginx config syntax check complete"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  allow_failure: true

# Validate app-files content against schemas
lint:content:
  stage: lint
  tags: [docker]
  image: python:3.11-slim
  before_script:
    - pip install --quiet jsonschema
  script:
    - python scripts/validate-content.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - changes:
        - app-files-src/**/*
        - scripts/**/*

# Build app-files manifest and output
build:content:
  stage: build
  tags: [docker]
  image: python:3.11-slim
  script:
    - python scripts/build-manifest.py --version "${CONTENT_VERSION:-1.0.0}"
  artifacts:
    paths:
      - public/app-files/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - changes:
        - app-files-src/**/*
        - scripts/**/*

# Build and push docker image
#
# On MRs: builds the image to validate the Dockerfile (local tag only).
# On main: builds and pushes to GitLab Container Registry.
#
# Note: CI_REGISTRY_IMAGE may be empty if the project container registry
# is not enabled, so we fall back to a local tag for validation builds.
build:docker:
  stage: build
  tags: [docker]
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_BUILDKIT: "1"
  script:
    - IMAGE="${CI_REGISTRY_IMAGE:-vauchi-website}"
    - >-
      printf '{"sha":"%s","short_sha":"%s","ref":"%s","built":"%s","pipeline":"%s"}\n'
      "$CI_COMMIT_SHA" "$CI_COMMIT_SHORT_SHA" "$CI_COMMIT_REF_NAME"
      "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$CI_PIPELINE_URL"
      > public/build-info.json
    - cat public/build-info.json
    - docker build -t $IMAGE:$CI_COMMIT_SHA .
    - docker tag $IMAGE:$CI_COMMIT_SHA $IMAGE:latest
    - |
      if [ -n "$CI_REGISTRY_PASSWORD" ] && [ -n "$CI_REGISTRY_IMAGE" ]; then
        echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
        docker push $IMAGE:$CI_COMMIT_SHA
        docker push $IMAGE:latest
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# Container vulnerability scanning (overrides GitLab template)
container_scanning:
  stage: scan
  tags: [docker]
  needs: ["build:docker"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Deploy website to production
#
# Replaces the running landing container on the deployment host.
# The kamal-proxy routes vauchi.app traffic to port 3080.
#
# Manual gate — click "play" on main after verifying the build is good.
deploy:production:
  stage: deploy
  tags: [docker]
  image: alpine:latest
  needs:
    - job: build:docker
  variables:
    GIT_STRATEGY: none
  before_script:
    - apk add --no-cache openssh-client curl
    - mkdir -p ~/.ssh
    - echo "$DEPLOY_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - |
      IMAGE="${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}"
      CONTAINER="vauchi-landing-${CI_COMMIT_SHORT_SHA}"
      SSH_TARGET="${DEPLOY_USER:-vauchi}@${DEPLOY_HOST}"
      echo "Deploying website: $IMAGE"

      # Pull new image on server
      ssh "$SSH_TARGET" \
        "echo '${KAMAL_REGISTRY_PASSWORD}' | docker login -u gitlab-ci-token --password-stdin ${CI_REGISTRY} && docker pull ${IMAGE}"

      # Stop any container bound to port 3080
      ssh "$SSH_TARGET" "\
        docker ps --filter 'publish=3080' -q | xargs -r docker stop | xargs -r docker rm || true"

      # Start new container
      ssh "$SSH_TARGET" "\
        docker run -d --name ${CONTAINER} \
          --restart unless-stopped \
          -p 3080:80 \
          ${IMAGE}"

      # Health check via SSH
      ssh "$SSH_TARGET" "\
        for i in \$(seq 1 15); do \
          curl -sf http://localhost:3080/health > /dev/null 2>&1 && break; \
          sleep 1; \
        done && \
        curl -sf http://localhost:3080/health || \
          { echo 'Health check failed'; docker rm -f ${CONTAINER}; exit 1; }"

      # Verify externally
      sleep 3
      STATUS=$(curl -sf -o /dev/null -w '%{http_code}' --max-time 10 "https://vauchi.app/build-info.json" || echo "000")
      if [ "$STATUS" = "200" ]; then
        echo "Deployment verified — build-info.json accessible"
      else
        echo "WARNING: External check returned $STATUS (may be DNS/proxy delay)"
      fi
  environment:
    name: production
    url: https://vauchi.app
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
