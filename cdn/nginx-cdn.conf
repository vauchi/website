# Privacy-hardened Nginx config for cdn.vauchi.app
#
# Runs behind kamal-proxy which handles TLS termination using the
# wildcard *.vauchi.app certificate. This Nginx only listens on :80.
# See PRB-2026-02-01 for threat model.

# Anonymized log format: no IP, no User-Agent, no Referer
log_format anonymized '$time_iso8601 $status $body_bytes_sent "$request_uri"';

server {
    listen 80;
    server_name cdn.vauchi.app;

    # Security headers — privacy-hardened
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    # CORS — allow app origins only
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD" always;

    # Privacy: no tracking headers
    etag off;
    server_tokens off;

    # Anonymized logging
    access_log /var/log/nginx/cdn-access.log anonymized;
    error_log /var/log/nginx/cdn-error.log warn;

    # Gzip for JSON content
    gzip on;
    gzip_types application/json text/css;
    gzip_min_length 256;

    root /usr/share/nginx/html;

    # Versioned content (immutable, long cache)
    # NOTE: add_header in location blocks overrides server-level headers.
    # All shared headers (CORS, security) must be repeated here.
    location ~ ^/v[0-9]+/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;

        # Only GET and HEAD
        limit_except GET HEAD {
            deny all;
        }

        types {
            application/json json;
        }
        default_type application/octet-stream;
    }

    # Manifest endpoint (shorter cache — clients poll this)
    location = /v1/manifest.json {
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }

    # Health check (kamal-proxy uses this)
    location = /health {
        return 200 'OK';
        add_header Content-Type text/plain always;
        access_log off;
    }

    # Deny everything else
    location / {
        return 404;
    }
}
