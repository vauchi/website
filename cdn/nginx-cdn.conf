# Privacy-hardened Nginx config for cdn.vauchi.app
#
# Design: static file serving with anonymized logging, no tracking,
# immutable versioned paths. See PRB-2026-02-01 for threat model.

# Anonymized log format: no IP, no User-Agent, no Referer
log_format anonymized '$time_iso8601 $status $body_bytes_sent "$request_uri"';

server {
    listen 80;
    server_name cdn.vauchi.app;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cdn.vauchi.app;

    # TLS Configuration (certbot/Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/cdn.vauchi.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cdn.vauchi.app/privkey.pem;

    # TLS 1.3 only (privacy requirement)
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/cdn.vauchi.app/chain.pem;
    resolver 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # Security headers — privacy-hardened
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    # CORS — allow app origins only
    add_header Access-Control-Allow-Origin "https://vauchi.app" always;
    add_header Access-Control-Allow-Methods "GET, HEAD" always;

    # Privacy: no tracking headers
    # - No Set-Cookie
    # - No ETag (prevents tracking via cache identifiers)
    # - No Server version disclosure
    etag off;
    server_tokens off;

    # Anonymized logging
    access_log /var/log/nginx/cdn-access.log anonymized;
    error_log /var/log/nginx/cdn-error.log warn;

    # Gzip for JSON content
    gzip on;
    gzip_types application/json text/css;
    gzip_min_length 256;

    root /var/www/cdn.vauchi.app;

    # Versioned content (immutable, long cache)
    location ~ ^/v[0-9]+/ {
        # Immutable cache — content is versioned, never changes
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Only GET and HEAD
        limit_except GET HEAD {
            deny all;
        }

        # Types
        types {
            application/json json;
        }
        default_type application/octet-stream;
    }

    # Manifest endpoint (shorter cache — clients poll this)
    location = /v1/manifest.json {
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Health check
    location = /health {
        return 200 'OK';
        add_header Content-Type text/plain always;
        access_log off;
    }

    # Deny everything else
    location / {
        return 404;
    }
}
