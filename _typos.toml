# typos spell checker configuration for website repo
#
# Non-English locale files (de, fr, es, it) contain correct foreign words
# that the English spell checker flags as typos. We disable typos checking
# for all locale JSON files and rely on the validation script
# (scripts/validate.py --strict) for locale quality instead.

[type.json]
check-file = false
